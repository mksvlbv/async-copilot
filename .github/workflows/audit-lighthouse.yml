name: Audit — Lighthouse CI

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1" # Mondays 04:17 UTC — cheap weekly regression check
  # NOTE: intentionally NOT on: pull_request — this workflow is advisory,
  # not a merge-blocker, to keep the final-polish PR flow fast.

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx @lhci/cli@0.15.x autorun --config=./lighthouserc.cjs
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14
